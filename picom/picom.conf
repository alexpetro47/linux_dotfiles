# Backend and vsync (fixes black-out on workspace switch)
backend = "egl";
vsync = true;

# GLX stability (prevents crashes on idle/DPMS)
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = false;

# Opacity
active-opacity = 0.95;
inactive-opacity = 0.90;
frame-opacity = 1.0;
opacity-rule = [
  "93:class_g = 'Alacritty'",
  "93:class_g = 'kitty'",
  "95:class_g = 'Brave'",
  "100:class_g = 'Rofi'"
];

